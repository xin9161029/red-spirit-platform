	<script>
		
		//1.jquery实现图片反转
		let imgs=["img/国徽.png","img/天安门.png"];
		let currentIndex=0;//当前图片索引
		$("#left").click(function(){
			currentIndex--;
			if(currentIndex<0) currentIndex=imgs.length-1;
				$("#bb").attr("src",imgs[currentIndex]);
			});
			
		
		$("#right").click(function(){
			currentIndex++;
			if(currentIndex>=imgs.length) currentIndex=0;
				$("#bb").attr("src",imgs[currentIndex]);
			});
		
		//2.定时器轮播
		let	timer;//存储定时器id set
		function autoPlayHandler(){
			currentIndex++;
			if(currentIndex>=imgs.length) currentIndex=0;
				$("#bb").attr("src",imgs[currentIndex]);
		};
		function autoPlay(){
			timer=setInterval(autoPlayHandler,3000);
		};
			
		//鼠标悬停 清除定时器
		function pasue(){
			clearInterval(timer);
		}
		//鼠标离开 启动定时器
		function resume(){
			autoPlay();
		}
		function Init(){
			autoPlay();
			//鼠标悬停 绑定时间
			$("#left").hover(pasue,resume);
			$("#right").hover(pasue,resume);
			
		}
		//加载jquery
		$(Init);
		
		//跑马灯
		$("#id_mq img").hover(function(){
			$(this).addClass("cur").fadeIn(1000);
			// siblings()取得出我之外的 所有兄弟标签
			$(this).siblings().removeClass("cur");
		});
		// 区域选中事件 实现放大 和动画切换效果
		$("#id_mq img").click(function(){
			// 移除区域其他的放大效果 removeclass
			$(this).siblings().removeClass();
			// 2.选中区域动画 先消失--->再出现【放大】
			$(this).fadeOut(500,function(){ });
			// 动画出现
			$(this).fadeIn(600);
			// 添加类属性 放大
			$(this).addClass("cur");
		});
	</script>
