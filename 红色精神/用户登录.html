<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>红色文化传承 - 红色足迹</title>
	<script src="js/jquery-3.6.0.js"></script>
	<style>
		/* 全局样式重置 */
		* {
		    margin: 0;
		    padding: 0;
		    box-sizing: border-box;
		    font-family: "微软雅黑", sans-serif;
		}
		
		body {
		    background-color: #f5f5f5;
		}
		
		/* 顶部横幅 */
		.top-banner {
		    background-color: #c00;
		    color: #fff;
		    padding: 10px 20px;
		}
		.banner-right{
			display: flex;
			justify-content:right;
		}
		.banner-text {
		    font-size: 18px;
		    font-weight: bold;
		}
		
		
		.search-input {
		    width: 250px;
		    height: 30px;
		    padding: 0 10px;
		    border: none;
		    border-radius: 3px 0 0 3px;
		    outline: none;
		}
		
		.search-btn {
		    height: 30px;
		    padding: 0 15px;
		    background-color: #ffd700;
		    color: #c00;
		    border: none;
		    border-radius: 0 3px 3px 0;
		    cursor: pointer;
		    font-weight: bold;
		}
		
		/* 轮播图 */
		.ibox{
		width: 100%;
		height: 400px;
		position: relative;
		
		}
		.ibox #left{
		width: 600px;
		height: 400px;
		position: absolute;
		left: 0;
		top: 0;
		cursor: url(./img/cur/bigpicprev_1245caf.cur), default;
		}
		.ibox #right{
		width: 600px;
		height: 400px;
		position: absolute;
		right: 0;
		top: 0;
		cursor: url(./img/cur/bigpicnext_437c161.cur), default;
		}
		#bb{
			width: 100%;
			height: 100%;
			display: block;
		}
		
		/* 导航栏 */
		.nav-bar {
		    background-color: #c00;
		    margin: 10px 0;
		}
		
		.nav-bar ul {
		    display: flex;
		    list-style: none;
		    justify-content: center;
		}
		
		.nav-bar li {
		    margin: 0 15px;
		}
		
		.nav-bar a {
		    display: block;
		    color: #fff;
		    text-decoration: none;
		    padding: 12px 20px;
		    font-size: 16px;
		}
		
		.nav-bar a.active,
		.nav-bar a:hover {
		    background-color: #a00;
		}
		
		/* 登录容器 */
		/* 外层容器 - 整体居中 + 间距 */
    .register-container {
        width: 100%;
        max-width: 850px; /* 限制最大宽度，避免大屏过宽 */
        margin: 50px auto; /* 上下50px，左右自动居中 */
        padding: 0 20px; /* 小屏左右留边 */
        box-sizing: border-box;
    }

    /* 表单盒子 - 内层居中 + 美化 */
    .register-box {
        width: 100%;
        max-width: 650px; /* 表单内容最大宽度 */
        margin: 0 auto; /* 盒子在容器内居中 */
        background: #ffffff; /* 白色背景 */
        border-radius: 12px; /* 圆角 */
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); /* 柔和阴影 */
        padding: 35px 20px; /* 内边距 */
        border: 1px solid #f0f0f0; /* 浅边框 */
    }

    /* 标题样式 */
    .register-box h2 {
        text-align: center; /* 标题居中 */
        color: #c81623; /* 红色主题色 */
        font-size: 24px;
        margin-bottom: 30px;
        padding-bottom: 15px;
        border-bottom: 2px solid #f5f5f5;
        font-weight: 600;
    }

    /* 表格样式 - 居中 + 美化 */
    .register-table {
        width: 100%;
        max-width: 550px; /* 表格最大宽度 */
        margin: 0 auto; /* 表格在盒子内居中 */
        border-collapse: collapse;
        border-color: #e0e0e0; /* 浅灰色边框，替代默认黑边框 */
    }

    /* 表格单元格样式 */
    .register-table td {
        padding: 12px 15px; /* 单元格内边距 */
        vertical-align: middle;
    }

    /* 输入框样式 */
    .register-table input[type="text"],
    .register-table input[type="password"] {
        width: 100%;
        max-width: 380px; /* 输入框最大宽度 */
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 6px; /* 输入框圆角 */
        font-size: 14px;
        outline: none;
        transition: border-color 0.3s ease;
        box-sizing: border-box;
    }

    /* 输入框聚焦效果 */
    .register-table input:focus {
        border-color: #c81623; /* 聚焦时红色边框 */
        box-shadow: 0 0 0 3px rgba(200, 22, 35, 0.1); /* 外发光 */
    }

    /* 提示文字样式 */
    .msg {
        display: block; /* 独占一行 */
        margin-top: 5px;
        font-size: 12px;
        color: #c81623; /* 红色提示 */
        margin-left: 80px; /* 对齐输入框 */
    }

    /* 提交按钮样式 */
    .btn-register {
        padding: 10px 45px;
        background: #c81623; /* 红色主题 */
        color: #ffffff;
        border: none;
        border-radius: 8px; /* 按钮圆角 */
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(200, 22, 35, 0.2);
    }

    /* 按钮hover效果 */
    .btn-register:hover {
        background: #a8121e; /* 深一点的红色 */
        transform: translateY(-2px); /* 轻微上移 */
        box-shadow: 0 4px 12px rgba(200, 22, 35, 0.3); /* 增强阴影 */
    }

    /* 按钮点击效果 */
    .btn-register:active {
        transform: translateY(0);
        box-shadow: 0 2px 6px rgba(200, 22, 35, 0.2);
    }

    /* 响应式适配 - 小屏优化 */
    @media (max-width: 768px) {
        .register-container {
            margin: 30px auto;
        }
        .register-box {
            padding: 25px 15px;
        }
        .register-table td {
            padding: 10px 10px;
        }
        .register-table input {
            max-width: 100%; /* 小屏输入框占满宽度 */
        }
        .msg {
            margin-left: 0; /* 小屏提示文字左对齐 */
        }
    }
		/* 底部标语 */
		.bottom-banner {
		    background-color: #c00;
		    color: #fff;
		    text-align: center;
		    padding: 15px 0;
		    font-size: 18px;
		    font-weight: bold;
		    margin-top: 20px;
		}
		
		
		    .top-banner {
		        flex-direction: column;
		        gap: 10px;
		    }
		
		    .search-input {
		        width: 200px;
		    }
		
		    .nav-bar ul {
		        flex-wrap: wrap;
		    }
		}
	</style>
</head>
<body>

    <!-- 顶部横幅 -->
    <div class="top-banner">
        <div class="banner-text">传承红色基因，赓续红色血脉</div>
		<marquee id="content">清澈的爱，只为中国</marquee>
		<div class="banner-right">
			<input type="text" class="search-input" placeholder="请输入查询内容">
			<button class="search-btn">搜索</button>
		</div>
			
        
    </div>

    <!-- 轮播图容器 -->
   
	<div class="ibox">
		<img id="bb" src="img/1.png" width="500">
	
		<div id="left"></div>
		<div id="right"></div>
	</div>

    <!-- 导航栏 -->
    <nav class="nav-bar">
        <ul>
                        <li><a href="首页.html" >首页</a></li>
                        <li><a href="红色足迹.html">红色足迹</a></li>
                        <li><a href="精神谱系.html">精神谱系</a></li>
                        <li><a href="薪火相传.html">薪火相传</a></li>
            			<li><a href="红色传承.html">红色传承</a></li>
                        <li><a href="红色语录墙.html">红色语录墙</a></li>
                        <li><a href="#" class="active">用户登录</a></li>
            			<li><a href="在线自测.html">在线自测</a></li>
        </ul>
    </nav>

    <!-- 登录容器 -->
        <div class="register-container" >
            <div class="register-box">
                <h2 >用户登录</h2>
                <form id="registerForm" method="GET" action="注册成功.html" >
					 <!-- 表格添加margin:0 auto实现水平居中，同时调整宽度 -->
                    <table class="register-table" border="1"  >
                        <tr>
                            <td  >
                               用户名：<input type="text" id="username" placeholder="4-16位 字母数字下划线 不能以数字开头" size=40 />
                                <span id="usernameMsg" class="msg"></span>
                            </td>
                        </tr>
                        <tr>
                            <td >
                                &nbsp;&nbsp;密码：<input type="password" id="password" placeholder="6-16位 字母+数字+特殊字符 至少包含两种" size=40 />
                                <span id="passwordMsg" class="msg"></span>
                            </td>
                        </tr>
                        <tr>
                            <td >
                               确定密码：<input type="password" id="repassword" placeholder="6-16位 字母+数字+特殊字符 至少包含两种" size=40 />
                                <span id="repasswordMsg" class="msg"></span>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                &nbsp;&nbsp;邮箱：<input type="text" id="email" placeholder="请输入有效邮箱" size="40" />
                                <span id="emailMsg" class="msg"></span>
                            </td>
                        </tr>
                        <tr>
                            <td  >
                                手机号：<input type="text" id="phone" placeholder="请输入11位手机号" size="40" /> 
                                <span id="phoneMsg" class="msg"></span>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2" align="center" style="padding: 10px;">
                                <input type="submit" value="注册" class="btn-register"/>
								<input type="submit" value="登录" class="btn-register"/>
                            </td>
                        </tr>
                    </table>
                </form>
            </div>
        </div>
	
    <!-- 底部标语 -->
    <div class="bottom-banner">
        <p>&copy;版权所有 24国一冯楚萱 2414126020</p>
    </div>

   
	
	<script>
		
		//1.jquery实现图片反转
		let imgs=["img/国徽.png","img/天安门.png"];
		let currentIndex=0;//当前图片索引
		$("#left").click(function(){
			currentIndex--;
			if(currentIndex<0) currentIndex=imgs.length-1;
				$("#bb").attr("src",imgs[currentIndex]);
			});
			
		
		$("#right").click(function(){
			currentIndex++;
			if(currentIndex>=imgs.length) currentIndex=0;
				$("#bb").attr("src",imgs[currentIndex]);
			});
		
		//2.定时器轮播
		let	timer;//存储定时器id set
		function autoPlayHandler(){
			currentIndex++;
			if(currentIndex>=imgs.length) currentIndex=0;
				$("#bb").attr("src",imgs[currentIndex]);
		};
		function autoPlay(){
			timer=setInterval(autoPlayHandler,3000);
		};
			
		//鼠标悬停 清除定时器
		function pasue(){
			clearInterval(timer);
		}
		//鼠标离开 启动定时器
		function resume(){
			autoPlay();
		}
		function Init(){
			autoPlay();
			//鼠标悬停 绑定时间
			$("#left").hover(pasue,resume);
			$("#right").hover(pasue,resume);
			
		}
		//加载jquery
		$(Init);
		
		//登录
		$(function() {
		    // 登录按钮点击事件
		    $('#loginBtn').click(function() {
		        // 获取表单值
		        const username = $('#username').val().trim();
		        const password = $('#password').val().trim();
		        const confirmPwd = $('#confirmPwd').val().trim();
		
		        // 表单验证
		        if (!username) {
		            alert("请输入用户名！");
		            return;
		        }
		        if (!password) {
		            alert("请输入密码！");
		            return;
		        }
		        if (password !== confirmPwd) {
		            alert("两次输入的密码不一致！");
		            return;
		        }
		
		        // 模拟登录成功（实际项目中需对接后端接口）
		        alert(`登录成功！欢迎您，${username}`);
		        // 登录成功后跳转回用户留言页
		        window.location.href = "message.html";
		    });
		});
		//last 表单提交事件
		$("#register-container").submit(function(event){
			//form表单默认提交到action 值得 url 现在阻止执行
				event.preventDefault();
				//清空错误信息
				cleanAllMsg();
			
			//校验各表单内容
			let isUsernameOk=checkUserName();
			let isPasswordOk=checkPassword();
			let isRepasswordOk=checkRepassword();
			let isEmailok=checkEmail();
			let isPhoneOk=checkPhone();
			if(isUsernameOk&&isPasswordOk&&isRepasswordOk&&isEmailok&&isPhoneOk){
				window.alert("注册成功！");
				// 手动跳转到目标页面（和form的action保持一致）
				window.location.href = "注册成功.html";
			}
		});
	</script>
</body>
</html>
