<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>注册成功</title>
    <script src="js/jquery-3.6.0.js"></script>
    <style>
        
        /* 页面容器：全屏 + 相对定位（用于内容居中） */
        body {
            height: 100vh;
        }

        /* 轮播背景容器：全屏 + 绝对定位 */
        .ibox {
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 轮播图片样式：全屏覆盖 */
        .ibox img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保持比例覆盖全屏 */
        }

        /* 注册成功内容容器：居中 + 半透明背景 */
        .id_cls_02{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9); /* 半透明白色 */
            padding: 50px 80px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
        }

        /* 标题样式 */
        .id_cls_02 h1 {
            color: #e63946; /* 喜庆红色 */
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        /* 提示文字 */
        .id_cls_02 p {
            color: #333;
            font-size: 18px;
            margin-bottom: 30px;
        }

        /* 跳转登录按钮 */
        .id_cls_03 {
            display: inline-block;
            padding: 12px 40px;
            background: #457b9d;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        /* 按钮hover效果 */
        .id_cls_03:hover {
            background: #1d3557;
            transform: scale(1.05); /* 轻微放大 */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* 底部版权/提示 */
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>
    <!-- 轮播背景容器 -->
    <div class="ibox">
        <img id="bb" src="img/图片1.png" alt="背景图1"/>
    </div>

    <!-- 注册成功内容 -->
    <div class="id_cls_02">
        <h1>注册成功！</h1>
        <p>恭喜您完成注册，即将跳转到登录页面...</p>
        <a href="用户登录.html" class="id_cls_03">立即登录</a>
    </div>

    <!-- 底部提示 -->
    <div class="footer">&copy;此网站版权所有</div>

    <script>
        // 轮播图片列表
        let imgs = ["天安门.png", "图片2.png"];
        let currentIndex = 0; // 当前图片索引
        let timer; // 存储定时器id
        
        // 轮播切换函数
        function autoPlayHandler(){
            currentIndex++;
            if(currentIndex>=imgs.length) currentIndex=0;
            $("#bb").attr("src","img/"+imgs[currentIndex]);
        }
        
        // 启动自动轮播
        function autoPlay(){
            timer=setInterval(autoPlayHandler,3000);
        }
        
        // 鼠标悬停 清除定时器（保留函数结构，无实际绑定）
        function pause(){
            clearInterval(timer);
         }
         
         // 鼠标悬停 开启定时器（保留函数结构，无实际绑定）
         function resume(){
            autoPlay();
         }
         
         // 定义加载初始化函数
         function Init(){
            // 启动定时器
            autoPlay();
         }
        
        // 加载jquery
        $(Init);

        // 2.自动跳转到登录页（5秒后）
        setTimeout(() => {
            window.location.href = "用户登录.html";
        }, 5000);
    </script>
</body>
</html>
